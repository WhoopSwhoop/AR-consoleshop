# Netlify configuration for UcARs

[build]
  publish = "."
  command = ""

# Redirect all routes to index.html for the single-page app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set proper headers for GLB files
[[headers]]
  for = "/*.glb"
  [headers.values]
    Content-Type = "model/gltf-binary"
    Cache-Control = "public, max-age=31536000, immutable"

# Set headers for WebP images
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Set headers for JPG images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
